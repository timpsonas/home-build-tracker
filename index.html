<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#F7F5EF;
    --blueprint:#1B3A5C;
    --blueprint-dark:#122A44;
    --orange:#E8622C;
    --orange-dark:#C74F1F;
    --graphite:#2B2B2B;
    --muted:#7A8794;
    --line:#D8D2C4;
    --green:#4B7B5B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--graphite);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .headfont{
    font-family:"Arial Narrow","Bahnschrift Condensed",sans-serif;
    font-weight:800;
    letter-spacing:0.02em;
    text-transform:uppercase;
  }
  header{
    background:var(--blueprint);
    color:#EDEFF2;
    padding:18px 20px 16px;
    position:sticky;
    top:0;
    z-index:20;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  header .title{
    font-size:20px;
    letter-spacing:0.04em;
  }
  header .title .accent{color:var(--orange);}
  header .sub{
    font-size:12px;
    color:#AEC0D2;
    margin-top:2px;
    font-family:ui-monospace,monospace;
  }
  .wrap{max-width:760px;margin:0 auto;padding:16px;}
  .picker-row{
    display:flex;
    gap:8px;
    margin-top:14px;
    flex-wrap:wrap;
  }
  select, input[type=text]{
    font-size:14px;
    padding:8px 10px;
    border-radius:6px;
    border:1px solid #33506E;
    background:#0F2439;
    color:#fff;
    font-family:inherit;
  }
  select option{color:#000;background:#fff;}
  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
    border-radius:6px;
    font-size:13px;
    font-weight:700;
    padding:8px 14px;
  }
  .btn-orange{background:var(--orange);color:#fff;}
  .btn-orange:hover{background:var(--orange-dark);}
  .btn-ghost{background:transparent;color:#CADAE8;border:1px solid #33506E;}
  .btn-ghost:hover{background:#0F2439;}
  .btn-small{padding:5px 10px;font-size:12px;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px;
    margin-bottom:16px;
  }
  .card h2{
    font-size:13px;
    margin:0 0 10px 0;
    color:var(--blueprint);
  }
  .foundation-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .foundation-row label{font-size:13px;display:flex;gap:6px;align-items:center;color:var(--graphite);}

  /* Milestone rail */
  .rail{list-style:none;margin:0;padding:0;}
  .rail li{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:8px 4px;
    border-left:2px solid var(--line);
    margin-left:10px;
    padding-left:16px;
    position:relative;
  }
  .rail li::before{
    content:'';
    position:absolute;
    left:-7px;top:12px;
    width:12px;height:12px;
    border-radius:50%;
    background:var(--card);
    border:2px solid var(--muted);
  }
  .rail li.done{border-left-color:var(--orange);}
  .rail li.done::before{background:var(--orange);border-color:var(--orange-dark);}
  .rail li .mnum{
    font-family:ui-monospace,monospace;
    font-size:11px;
    color:var(--muted);
    min-width:26px;
  }
  .rail li.done .mnum{color:var(--orange-dark);font-weight:700;}
  .rail button.mcheck{
    all:unset;
    cursor:pointer;
    font-size:13.5px;
    flex:1;
    color:var(--graphite);
  }
  .rail li.done button.mcheck{color:var(--orange-dark);font-weight:600;}

  /* Task groups */
  .section-title{
    font-size:12px;
    letter-spacing:0.06em;
    color:var(--muted);
    margin:22px 0 8px 4px;
  }
  .task{
    display:flex;
    gap:10px;
    align-items:flex-start;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    margin-bottom:8px;
  }
  .task.ready{border-left:4px solid var(--orange);}
  .task.locked{opacity:0.6;}
  .task.done{opacity:0.55;}
  .task.done .tname{text-decoration:line-through;}
  .task input[type=checkbox]{
    width:18px;height:18px;
    margin-top:2px;
    accent-color:var(--orange);
    flex-shrink:0;
  }
  .task .tbody{flex:1;min-width:0;}
  .task .tname{font-size:14px;font-weight:600;}
  .task .tmeta{
    font-size:11.5px;
    color:var(--muted);
    margin-top:3px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .tag{
    font-family:ui-monospace,monospace;
    background:#EFEAE0;
    padding:1px 6px;
    border-radius:4px;
  }
  .lead{color:var(--blueprint);}
  .na-btn{
    font-size:11px;
    padding:4px 8px;
    background:#EFEAE0;
    color:var(--graphite);
    border-radius:5px;
    flex-shrink:0;
  }
  .na-btn.active{background:var(--blueprint);color:#fff;}
  .task.na{opacity:0.4;}

  .collapse-toggle{
    background:none;border:none;color:var(--blueprint);
    font-size:12px;font-weight:700;padding:4px 0;text-decoration:underline;
  }
  .empty{
    font-size:13px;color:var(--muted);padding:14px;text-align:center;
    background:var(--card);border:1px dashed var(--line);border-radius:8px;
  }
  .loading{padding:40px;text-align:center;color:var(--muted);}
  .err{color:var(--orange-dark);font-size:13px;padding:10px;}
  .error-banner{
    background:#FBE7DD;
    border:1px solid var(--orange);
    color:var(--orange-dark);
    border-radius:8px;
    padding:10px 12px;
    margin-bottom:14px;
    font-family:ui-monospace,monospace;
    font-size:12px;
    word-break:break-word;
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:flex-start;
  }
  .error-banner button{
    background:var(--orange);color:#fff;flex-shrink:0;padding:4px 8px;font-size:11px;
  }
  textarea{
    width:100%;
    min-height:120px;
    font-family:ui-monospace,monospace;
    font-size:11px;
    padding:8px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#FBFAF6;
    color:var(--graphite);
  }
</style>
</head>

function defaultNA(tag, foundationType){
  if(tag==='core' || tag==='site') return false;
  if(foundationType==='varies') return false;
  if(tag==='slab') return foundationType!=='slab';
  if(tag==='crawl-basement') return !(foundationType==='crawlspace'||foundationType==='basement');
  if(tag==='basement') return foundationType!=='basement';
  return false;
}

// ---------- STATE ----------
let jobs = [];
let currentJobName = null;
let currentJob = null; // {foundationType, milestones:{}, tasks:{id:{na,done}}}
let showLocked = false;
let showDone = false;
let showNA = false;
let showBackup = false;
let lastError = null;
let showDiag = false;
let diagLog = [];

const app = document.getElementById('app');
const pickerRow = document.getElementById('pickerRow');
const jobLabel = document.getElementById('jobLabel');

function newJobState(foundationType){
  const milestones = {};
  MILESTONES.forEach(m=>milestones[m.id]=false);
  const tasks = {};
  TASKS.forEach(t=>tasks[t.id]={na:defaultNA(t.tag,foundationType), done:false});
  return {foundationType, milestones, tasks};
}

async function loadJobsList(){
  try{
    const { data, error } = await sb.from('jobs').select('name').order('name');
    if(error) throw error;
    jobs = (data || []).map(r=>r.name);
  }catch(e){
    jobs = [];
    lastError = 'LOAD JOB LIST FAILED: ' + (e && e.message ? e.message : String(e));
  }
}

async function loadJob(name){
  try{
    const { data, error } = await sb.from('jobs').select('*').eq('name', name).single();
    if(error) throw error;
    currentJob = {
      foundationType: data.foundation_type,
      milestones: data.milestones,
      tasks: data.tasks
    };
    currentJobName = data.name;
    lastError = null;
  }catch(e){
    lastError = 'LOAD JOB FAILED: ' + (e && e.message ? e.message : String(e));
  }
}

let saveChain = Promise.resolve();
function saveJob(){
  // Serialize saves so overlapping clicks don't fire concurrent requests
  saveChain = saveChain.then(async ()=>{
    if(!currentJobName || !currentJob) return;
    try{
      const { error } = await sb.from('jobs').update({
        foundation_type: currentJob.foundationType,
        milestones: currentJob.milestones,
        tasks: currentJob.tasks,
        updated_at: new Date().toISOString()
      }).eq('name', currentJobName);
      if(error) throw error;
      lastError = null;
    }catch(e){
      lastError = 'SAVE FAILED: ' + (e && e.message ? e.message : String(e));
    }
  });
  return saveChain;
}

async function createJob(name, foundationType){
  const state = newJobState(foundationType);
  try{
    const { error } = await sb.from('jobs').insert({
      name,
      foundation_type: foundationType,
      milestones: state.milestones,
      tasks: state.tasks
    });
    if(error) throw error;
    currentJobName = name;
    currentJob = state;
    lastError = null;
  }catch(e){
    lastError = 'CREATE JOB FAILED: ' + (e && e.message ? e.message : String(e));
  }
  await loadJobsList();
  render();
}

async function deleteCurrentJob(){
  if(!currentJobName) return;
  if(!confirm('Delete "'+currentJobName+'"? This cannot be undone.')) return;
  try{
    const { error } = await sb.from('jobs').delete().eq('name', currentJobName);
    if(error) throw error;
  }catch(e){
    lastError = 'DELETE FAILED: ' + (e && e.message ? e.message : String(e));
  }
  currentJobName = null;
  currentJob = null;
  await loadJobsList();
  render();
}

function furthestMilestoneIndex(){
  let idx=-1;
  M_ORDER.forEach((id,i)=>{ if(currentJob.milestones[id]) idx=i; });
  return idx;
}

function isUnlocked(taskTrigger){
  return !!currentJob.milestones[taskTrigger];
}

// ---------- RENDER ----------
function renderPicker(){
  let html = '';
  html += '<select id="jobSelect">';
  html += '<option value="">— select job —</option>';
  jobs.forEach(j=>{
    html += `<option value="${escAttr(j)}" ${j===currentJobName?'selected':''}>${escHtml(j)}</option>`;
  });
  html += '</select>';
  html += '<button class="btn-orange" id="newJobBtn">+ New Job</button>';
  if(currentJobName){
    html += '<button class="btn-ghost" id="delJobBtn">Delete</button>';
  }
  pickerRow.innerHTML = html;

  document.getElementById('jobSelect').addEventListener('change', async (e)=>{
    const val = e.target.value;
    if(!val){ currentJobName=null; currentJob=null; render(); return; }
    await loadJob(val);
    render();
  });
  document.getElementById('newJobBtn').addEventListener('click', renderNewJobForm);
  const delBtn = document.getElementById('delJobBtn');
  if(delBtn) delBtn.addEventListener('click', deleteCurrentJob);
}

function renderNewJobForm(){
  app.innerHTML = `
    <div class="card">
      <h2 class="headfont">New Job</h2>
      <div style="margin-bottom:12px;">
        <input type="text" id="newJobName" placeholder="Job name (e.g. customer name)" style="width:100%;background:#fff;color:var(--graphite);border:1px solid var(--line);">
      </div>
      <div class="foundation-row" style="margin-bottom:14px;">
        <label><input type="radio" name="fnd" value="slab" checked> Slab</label>
        <label><input type="radio" name="fnd" value="crawlspace"> Crawlspace</label>
        <label><input type="radio" name="fnd" value="basement"> Basement</label>
        <label><input type="radio" name="fnd" value="varies"> Varies / not sure yet</label>
      </div>
      <button class="btn-orange" id="createBtn">Create Job</button>
    </div>
  `;
  document.getElementById('createBtn').addEventListener('click', async ()=>{
    const nameEl = document.getElementById('newJobName');
    const name = nameEl.value.trim();
    if(!name){ nameEl.style.borderColor='var(--orange)'; return; }
    if(jobs.includes(name)){ alert('A job with that name already exists.'); return; }
    const fnd = document.querySelector('input[name=fnd]:checked').value;
    await createJob(name, fnd);
  });
}

function diagCard(){
  return ''; // diagnostics panel not needed in hosted version
}

function attachDiagHandlers(){
  // no-op in hosted version
}

function escHtml(s){return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escAttr(s){return escHtml(s);}

function render(){
  jobLabel.textContent = currentJobName ? currentJobName : 'no job loaded';
  renderPicker();

  if(!currentJobName || !currentJob){
    let empty = '';
    if(lastError){
      empty += `<div class="error-banner"><span>${escHtml(lastError)}</span><button id="dismissErr">OK</button></div>`;
    }
    empty += jobs.length
      ? '<div class="empty">Select a job above, or create a new one.</div>'
      : '<div class="empty">No jobs yet — tap "+ New Job" to start tracking one.</div>';
    empty += diagCard();
    app.innerHTML = empty;
    const de = document.getElementById('dismissErr');
    if(de) de.addEventListener('click', ()=>{ lastError=null; render(); });
    attachDiagHandlers();
    return;
  }

  const readyTasks = [];
  const lockedTasks = [];
  const doneTasks = [];
  const naTasks = [];

  TASKS.forEach(t=>{
    const st = currentJob.tasks[t.id];
    if(st.na){ naTasks.push(t); return; }
    if(st.done){ doneTasks.push(t); return; }
    if(isUnlocked(t.trigger)) readyTasks.push(t);
    else lockedTasks.push(t);
  });

  let html = '';

  if(lastError){
    html += `<div class="error-banner">
      <span>${escHtml(lastError)}</span>
      <button id="dismissErr">OK</button>
    </div>`;
  }

  // Backup / restore
  html += diagCard();
  html += `<div class="card">
    <button class="collapse-toggle" id="toggleBackup">${showBackup?'Hide':'Show'} backup / restore</button>
    ${showBackup ? `
      <div style="margin-top:10px;">
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Export copies this job's data as text — paste it somewhere safe. Import replaces this job's data with pasted text.</div>
        <textarea id="backupText"></textarea>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn-orange btn-small" id="exportBtn">Export current job</button>
          <button class="btn-ghost btn-small" id="importBtn" style="color:var(--blueprint);border-color:var(--line);">Import from text above</button>
        </div>
      </div>
    ` : ''}
  </div>`;

  // Foundation type
  html += `<div class="card">
    <h2 class="headfont">Foundation Type</h2>
    <div class="foundation-row" id="fndRow">
      ${['slab','crawlspace','basement','varies'].map(v=>`
        <label><input type="radio" name="fndEdit" value="${v}" ${currentJob.foundationType===v?'checked':''}> ${v.charAt(0).toUpperCase()+v.slice(1)}</label>
      `).join('')}
    </div>
  </div>`;

  // Milestone rail
  html += `<div class="card">
    <h2 class="headfont">Site Progress — Check Off As It Happens</h2>
    <ul class="rail" id="rail">
      ${MILESTONES.map((m,i)=>`
        <li class="${currentJob.milestones[m.id]?'done':''}" data-mid="${m.id}">
          <span class="mnum">${String(i+1).padStart(2,'0')}</span>
          <button class="mcheck" data-mid="${m.id}">${escHtml(m.label)}</button>
        </li>
      `).join('')}
    </ul>
  </div>`;

  // Ready now
  html += `<div class="section-title headfont">Ready to work on now (${readyTasks.length})</div>`;
  html += readyTasks.length
    ? readyTasks.map(t=>taskRow(t,'ready')).join('')
    : '<div class="empty">Nothing unlocked yet. Check off a milestone above.</div>';

  // Locked
  html += `<div class="section-title headfont">
      <button class="collapse-toggle" id="toggleLocked">${showLocked?'Hide':'Show'} upcoming tasks (${lockedTasks.length})</button>
    </div>`;
  if(showLocked){
    html += lockedTasks.length
      ? lockedTasks.map(t=>taskRow(t,'locked')).join('')
      : '<div class="empty">Nothing upcoming.</div>';
  }

  // Done
  html += `<div class="section-title headfont">
      <button class="collapse-toggle" id="toggleDone">${showDone?'Hide':'Show'} completed (${doneTasks.length})</button>
    </div>`;
  if(showDone){
    html += doneTasks.length
      ? doneTasks.map(t=>taskRow(t,'done')).join('')
      : '<div class="empty">Nothing completed yet.</div>';
  }

  // N/A
  html += `<div class="section-title headfont">
      <button class="collapse-toggle" id="toggleNA">${showNA?'Hide':'Show'} marked N/A (${naTasks.length})</button>
    </div>`;
  if(showNA){
    html += naTasks.length
      ? naTasks.map(t=>taskRow(t,'na')).join('')
      : '<div class="empty">Nothing marked N/A.</div>';
  }

  app.innerHTML = html;
  attachHandlers();
}

function taskRow(t, state){
  const st = currentJob.tasks[t.id];
  const milestoneLabel = MILESTONES.find(m=>m.id===t.trigger).label;
  return `
    <div class="task ${state}">
      <input type="checkbox" data-task="${t.id}" ${st.done?'checked':''} ${state==='na'?'disabled':''}>
      <div class="tbody">
        <div class="tname">${escHtml(t.name)}</div>
        <div class="tmeta">
          <span class="tag">${escHtml(t.phase)}</span>
          <span class="lead">⏱ ${escHtml(t.lead)}</span>
          ${state==='locked' ? `<span>unlocks at: ${escHtml(milestoneLabel)}</span>` : ''}
        </div>
      </div>
      <button class="na-btn ${st.na?'active':''}" data-na="${t.id}">${st.na?'✓ N/A — tap to restore':'N/A'}</button>
    </div>
  `;
}

function attachHandlers(){
  attachDiagHandlers();
  const dismissErr = document.getElementById('dismissErr');
  if(dismissErr) dismissErr.addEventListener('click', ()=>{ lastError=null; render(); });

  const toggleBackup = document.getElementById('toggleBackup');
  if(toggleBackup) toggleBackup.addEventListener('click', ()=>{ showBackup=!showBackup; render(); });

  const exportBtn = document.getElementById('exportBtn');
  if(exportBtn) exportBtn.addEventListener('click', ()=>{
    const ta = document.getElementById('backupText');
    ta.value = JSON.stringify({name:currentJobName, data:currentJob}, null, 2);
    ta.select();
  });

  const importBtn = document.getElementById('importBtn');
  if(importBtn) importBtn.addEventListener('click', async ()=>{
    const ta = document.getElementById('backupText');
    try{
      const parsed = JSON.parse(ta.value);
      if(!parsed.data || !parsed.data.milestones || !parsed.data.tasks) throw new Error('missing expected fields');
      currentJob = parsed.data;
      if(parsed.name) currentJobName = parsed.name;
      await saveJob();
      render();
    }catch(e){
      lastError = 'IMPORT FAILED: ' + (e && e.message ? e.message : String(e));
      render();
    }
  });

  const fndRow = document.getElementById('fndRow');
  if(fndRow){
    fndRow.querySelectorAll('input[name=fndEdit]').forEach(r=>{
      r.addEventListener('change', async (e)=>{
        currentJob.foundationType = e.target.value;
        // recompute NA defaults for foundation-tagged tasks not yet done
        TASKS.forEach(t=>{
          if(t.tag!=='core' && t.tag!=='site' && !currentJob.tasks[t.id].done){
            currentJob.tasks[t.id].na = defaultNA(t.tag, currentJob.foundationType);
          }
        });
        await saveJob();
        render();
      });
    });
  }

  const rail = document.getElementById('rail');
  if(rail){
    rail.querySelectorAll('button.mcheck').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const mid = btn.getAttribute('data-mid');
        currentJob.milestones[mid] = !currentJob.milestones[mid];
        await saveJob();
        render();
      });
    });
  }

  app.querySelectorAll('input[type=checkbox][data-task]').forEach(cb=>{
    cb.addEventListener('change', async ()=>{
      const id = cb.getAttribute('data-task');
      currentJob.tasks[id].done = cb.checked;
      await saveJob();
      render();
    });
  });

  app.querySelectorAll('button[data-na]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-na');
      currentJob.tasks[id].na = !currentJob.tasks[id].na;
      await saveJob();
      render();
    });
  });

  const tl = document.getElementById('toggleLocked');
  if(tl) tl.addEventListener('click', ()=>{ showLocked=!showLocked; render(); });
  const td = document.getElementById('toggleDone');
  if(td) td.addEventListener('click', ()=>{ showDone=!showDone; render(); });
  const tn = document.getElementById('toggleNA');
  if(tn) tn.addEventListener('click', ()=>{ showNA=!showNA; render(); });
}

// ---------- INIT ----------
(async function init(){
  await loadJobsList();
  render();
})();
</script>
</body>
</html>
